<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TESTER DE AUDIO EN VIVO</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #33ff33; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
        }
        .card { 
            width: 100%; 
            max-width: 600px; 
            border: 4px solid #33ff33; 
            padding: 20px; 
            background: #000;
        }
        h1 { text-align: center; border-bottom: 2px solid #33ff33; padding-bottom: 10px; font-size: 1.5rem; }
        .block { border: 2px solid #33ff33; padding: 15px; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        button { 
            background: #33ff33; color: #000; border: none; 
            padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px;
        }
        button:hover { background: #22cc22; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        select { width: 100%; padding: 5px; background: #000; color: #33ff33; border: 1px solid #33ff33; margin-bottom: 10px; font-family: inherit;}
    </style>
</head>
<body>

<div class="card">
    <h1>> TESTER DE AUDIO EN VIVO</h1>

    <div class="block" style="border-color: #ffaa00;">
        <h3 style="color: #ffaa00; margin-top: 0;">[RUTEO DE SALIDA]</h3>
        <button onclick="detectarSalidas()" style="background:#ffaa00;">ESCANEAR DISPOSITIVOS DE AUDIO</button>
        <label>SALIDA SELECCIONADA:</label>
        <select id="audioOutput" onchange="cambiarSalida(this.value)">
            <option value="default">Salida Predeterminada del Sistema</option>
        </select>
    </div>
    
    <div class="block">
        <h3 style="margin-top: 0;">[GEN_OSCILADOR]</h3>
        <select id="oscType">
            <option value="sine">SENOIDAL</option>
            <option value="square">CUADRADA</option>
            <option value="sawtooth">SIERRA</option>
        </select>
        <label>FREC: <span id="fVal">440</span> Hz</label>
        <input type="range" id="freqRange" min="20" max="2000" value="440">
        <label>VOL OSC: <span id="vOscVal">0.1</span></label>
        <input type="range" id="volOsc" min="0" max="100" value="10">
        <button onclick="toggleOsc()">INICIAR / DETENER TONE</button>
        <button onclick="startSweep()" style="background:#ffaa00;">AUTO BARRIDO (SWEEP)</button>
    </div>

    <div class="block">
        <h3 style="margin-top: 0;">[GEN_RUIDO]</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button onclick="playNoise('white')">BLANCO</button>
            <button onclick="playNoise('pink')">ROSA</button>
            <button onclick="playNoise('brown')">CAFE</button>
        </div>
        <label>VOL RUIDO: <span id="vNoiseVal">0.1</span></label>
        <input type="range" id="volNoise" min="0" max="100" value="10">
        <button onclick="stopAllNoise()" style="background:#ff3333; color: white;">STOP NOISE</button>
    </div>
</div>

<script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = null, oscGain = ctx.createGain(), noiseNode = null, noiseGain = ctx.createGain();
    
    // Nodos maestros de volumen
    oscGain.gain.value = 0.1;
    noiseGain.gain.value = 0.1;
    oscGain.connect(ctx.destination);
    noiseGain.connect(ctx.destination);

    // --- Ruteo de Audio ---
    async function detectarSalidas() {
        try {
            // Se solicita permiso de micrófono brevemente para que el navegador revele los nombres reales de las salidas
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioOutputs = devices.filter(device => device.kind === 'audiooutput');
            
            const select = document.getElementById('audioOutput');
            select.innerHTML = '<option value="default">Salida Predeterminada</option>'; // Reset
            
            audioOutputs.forEach(device => {
                if (device.deviceId !== 'default' && device.deviceId !== 'communications') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Salida desconocida (${device.deviceId.slice(0,5)}...)`;
                    select.appendChild(option);
                }
            });
            alert("Dispositivos de audio actualizados. Selecciona tu salida en el menú.");
        } catch (err) {
            console.error("Error al acceder a los dispositivos:", err);
            alert("Para ver los nombres de las bocinas, el navegador necesita permiso de audio/micrófono.");
        }
    }

    async function cambiarSalida(deviceId) {
        if (typeof ctx.setSinkId === 'function') {
            try {
                await ctx.setSinkId(deviceId);
                console.log(`Audio ruteado al dispositivo: ${deviceId}`);
            } catch (err) {
                console.error("Error al rutear el audio:", err);
            }
        } else {
            alert("Tu navegador no soporta ruteo manual (setSinkId). Usa Chrome o Edge para esta función.");
        }
    }

    // --- Generadores ---
    function toggleOsc() {
        if (ctx.state === 'suspended') ctx.resume();
        if (osc) { osc.stop(); osc = null; } 
        else {
            osc = ctx.createOscillator();
            osc.type = document.getElementById('oscType').value;
            osc.frequency.value = document.getElementById('freqRange').value;
            osc.connect(oscGain);
            osc.start();
        }
    }

    function startSweep() {
        if (ctx.state === 'suspended') ctx.resume();
        if (!osc) toggleOsc();
        let freq = 20;
        let interval = setInterval(() => {
            freq += 10;
            if (freq > 20000 || !osc) {
                clearInterval(interval);
            } else { 
                osc.frequency.value = freq; 
                document.getElementById('freqRange').value = freq;
                document.getElementById('fVal').innerText = freq; 
            }
        }, 50);
    }

    function playNoise(type) {
        if (ctx.state === 'suspended') ctx.resume();
        stopAllNoise();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
        const data = buf.getChannelData(0);
        let b = [0,0,0,0,0,0,0];
        
        for (let i = 0; i < buf.length; i++) {
            let w = Math.random() * 2 - 1;
            if (type === 'white') data[i] = w;
            else if (type === 'pink') {
                b[0] = 0.99886*b[0] + w*0.0555179;
                b[1] = 0.99332*b[1] + w*0.0750759;
                b[2] = 0.96900*b[2] + w*0.1538520;
                b[3] = 0.86
